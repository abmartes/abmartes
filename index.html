<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkanoid Galaxy Audio - @abmartes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050509">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background: #050509; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; font-family: 'Press Start 2P', cursive; }
        #game-container { position: relative; }
        canvas { background: #000; border: 3px solid #00f2ff; border-radius: 10px; max-width: 95vw; max-height: 85vh; display: block; }
        #hud { position: absolute; top: 15px; left: 15px; color: #00f2ff; font-size: 10px; pointer-events: none; }
        .btn-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; font-family: 'Press Start 2P', cursive; font-size: 16px; background: #ff0080; color: white; border: 4px solid #fff; cursor: pointer; box-shadow: 0 0 20px #ff0080; z-index: 10; }
        #startBtn { background: #00f2ff; box-shadow: 0 0 20px #00f2ff; color: #000; }
        #restartBtn { display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">SCORE: <span id="score">0</span></div>
        <button id="startBtn" class="btn-ui" onclick="startGame()">START GAME</button>
        <button id="restartBtn" class="btn-ui" onclick="resetGame()">REINICIAR</button>
        <canvas id="gameCanvas" width="550" height="400"></canvas>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");

        let audioCtx, gameActive = false, score = 0, x, y, dx, dy, paddleX, bricks;
        const ballRadius = 7, paddleHeight = 12, paddleWidth = 90;
        const brickRowCount = 4, brickColumnCount = 7, brickWidth = 65, brickHeight = 18;
        const stars = [];
        for(let i=0; i < 60; i++) { stars.push({ x: Math.random() * 550, y: Math.random() * 400, s: Math.random() * 2 }); }

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        
        function playTone(freq, type, duration, vol = 0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playMusic() {
            if(!gameActive) return;
            const notes = [261.63, 329.63, 392.00, 523.25];
            let now = audioCtx.currentTime;
            notes.forEach((note, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(note, now + (i * 0.25));
                gain.gain.setValueAtTime(0.02, now + (i * 0.25));
                gain.gain.exponentialRampToValueAtTime(0.0001, now + (i * 0.25) + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + (i * 0.25)); osc.stop(now + (i * 0.25) + 0.2);
            });
            setTimeout(() => { if(gameActive) playMusic(); }, 1200);
        }

        function initVariables() {
            score = 0; scoreElement.innerHTML = score;
            x = canvas.width / 2; y = canvas.height - 70;
            dx = 2.5; dy = -2.5;
            paddleX = (canvas.width - paddleWidth) / 2;
            bricks = [];
            for(let c=0; c<brickColumnCount; c++) {
                bricks[c] = [];
                for(let r=0; r<brickRowCount; r++) bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        function startGame() {
            initAudio(); initVariables();
            gameActive = true; startBtn.style.display = "none";
            playMusic(); draw();
        }

        function draw() {
            if (!gameActive) return;
            ctx.fillStyle = "rgba(5, 5, 15, 0.3)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); });
            ctx.font = "12px 'Press Start 2P'"; ctx.fillStyle = "rgba(255, 255, 0, 0.8)"; ctx.textAlign = "center";
            ctx.fillText("@abmartes", canvas.width / 2, canvas.height - 15);
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    if(bricks[c][r].status == 1) {
                        let bX = (c*(brickWidth+8))+25; let bY = (r*(brickHeight+8))+60;
                        bricks[c][r].x = bX; bricks[c][r].y = bY;
                        ctx.fillStyle = "#ff0080"; ctx.beginPath(); ctx.roundRect(bX, bY, brickWidth, brickHeight, 4); ctx.fill();
                    }
                }
            }
            ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI*2);
            ctx.fillStyle = "#fff"; ctx.shadowBlur = 12; ctx.shadowColor = "#00f2ff";
            ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.roundRect(paddleX, canvas.height - 50, paddleWidth, paddleHeight, 5); ctx.fill();

            if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) { dx = -dx; playTone(150, 'square', 0.1); }
            if(y + dy < ballRadius) { dy = -dy; playTone(150, 'square', 0.1); }
            else if(y + dy > canvas.height - 50) {
                if(x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy; dx *= 1.015; dy *= 1.015; playTone(300, 'square', 0.15);
                    let deltaX = x - (paddleX + paddleWidth/2); dx = deltaX * 0.15 * Math.abs(dy/2.5);
                } else if(y > canvas.height) { gameOver("GAME OVER"); }
            }
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status == 1 && x > b.x && x < b.x+brickWidth && y > b.y && y < b.y+brickHeight) {
                        dy = -dy; b.status = 0; score += 10; scoreElement.innerHTML = score;
                        dx *= 1.01; dy *= 1.01; playTone(600, 'square', 0.1);
                    }
                }
            }
            if(score === brickRowCount * brickColumnCount * 10) gameOver("VENCEU!");
            x += dx; y += dy; requestAnimationFrame(draw);
        }

        function handleInput(inputX) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let relativeX = (inputX - rect.left) * scaleX;
            if(relativeX > 0 && relativeX < canvas.width) { paddleX = relativeX - paddleWidth / 2; }
        }
        canvas.addEventListener("mousemove", (e) => handleInput(e.clientX));
        canvas.addEventListener("touchmove", (e) => { e.preventDefault(); handleInput(e.touches[0].clientX); }, {passive: false});
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleInput(e.touches[0].clientX); }, {passive: false});

        function gameOver(msg) {
            gameActive = false; playTone(100, 'sawtooth', 0.5);
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "20px 'Press Start 2P'"; ctx.fillStyle = "#00f2ff"; ctx.textAlign = "center";
            ctx.fillText(msg, canvas.width/2, canvas.height/2 - 20); restartBtn.style.display = "block";
        }
        function resetGame() { initVariables(); gameActive = true; restartBtn.style.display = "none"; playMusic(); draw(); }
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); });
    </script>
</body>
</html>
