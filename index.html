<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d5a27">
    <title>Manguezal 16-bit - @abmartes</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a1a; overflow: hidden; font-family: 'Courier New', monospace; }
        #game-container { position: relative; width: 512px; height: 512px; background-color: #3a5a3a; background-image: url('https://raw.githubusercontent.com/abmartes/abmartes/refs/heads/main/Fundo.jpg'); background-size: cover; border: 4px solid #2d5a27; image-rendering: pixelated; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; }
    </style>
</head>
<body>
<div id="game-container"><canvas id="gameCanvas"></canvas></div>
<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.height = 512;
    
    const objects = [];
    const leafColors = ['#2d5a27', '#4a7c44', '#1e3f1c', '#6eaa5e'];
    let audioCtx;
    let musicStarted = false;

    function playNote(freq, start, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(start); osc.stop(start + duration);
    }

    function playMusicLoop() {
        const now = audioCtx.currentTime;
        const melody = [261, 311, 392, 311, 261, 311, 392, 440]; 
        melody.forEach((n, i) => playNote(n, now + (i * 0.25), 0.2));
        setTimeout(playMusicLoop, 2000);
    }

    window.addEventListener('mousedown', () => { 
        if (!musicStarted) { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume(); 
            playMusicLoop(); 
            musicStarted = true; 
        } 
    });

    class Leaf {
        constructor(layer) { 
            this.layer = layer;
            this.init(); 
        }
        init() {
            if (this.layer === 'back') {
                this.size = 12; 
                this.speed = 0.4 + Math.random() * 0.6;
                this.opacity = 0.6;
                this.swing = 0.5;
            } else {
                this.size = 26; 
                this.speed = 1.8 + Math.random() * 1.2;
                this.opacity = 1;
                this.swing = 2;
            }
            this.x = Math.random() * canvas.width;
            this.y = -this.size * 3;
            this.color = leafColors[Math.floor(Math.random() * leafColors.length)];
            this.rotation = Math.random() * Math.PI * 2;
        }
        update() {
            this.y += this.speed;
            this.x += Math.sin(this.y * 0.05) * this.swing;
            this.rotation += 0.02;
            if (this.y > canvas.height + 30) this.init();
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(0, -this.size/2);
            ctx.quadraticCurveTo(this.size/2, 0, 0, this.size/2);
            ctx.quadraticCurveTo(-this.size/2, 0, 0, -this.size/2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = this.layer === 'back' ? 0.5 : 1.2;
            ctx.stroke();
            ctx.restore();
        }
    }

    for (let i = 0; i < 12; i++) objects.push(new Leaf('back'));
    for (let i = 0; i < 8; i++) objects.push(new Leaf('front'));

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objects.forEach(o => { o.update(); o.draw(); });
        ctx.fillStyle = "#FFFF00"; ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "center";
        ctx.shadowColor = "black"; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
        ctx.fillText("@abmartes", canvas.width / 2, canvas.height - 25);
        ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        if (!musicStarted) { 
            ctx.fillStyle = "white"; 
            ctx.font = "12px Arial"; 
            ctx.fillText("CLIQUE PARA ATIVAR O SOM", canvas.width/2, 40); 
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
